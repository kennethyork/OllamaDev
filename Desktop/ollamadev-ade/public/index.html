<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OllamaDev ADE</title>
<style>/* {{CSS}} */</style>
</head>
<body>
    <div id="banner">starting…</div>

    <header id="topbar">
        <span class="brand">OllamaDev <span class="dim">ADE</span></span>
        <span id="conn" class="conn">●</span>
        <select id="modelSelect" title="Model"></select>
        <button id="newTermBtn">+ Terminal</button>
        <button id="layoutBtn" title="Cycle layout: split / terminals / editor">Layout: Split</button>
        <div class="spacer"></div>
        <span id="cwd" class="dim"></span>
    </header>

    <main id="main">
        <aside id="sidebar">
            <div class="side-title">FILES</div>
            <div id="breadcrumb" class="dim"></div>
            <div id="fileTree"></div>
        </aside>
        <section id="workspace">
            <section id="editorPane">
                <div id="editorTabs"></div>
                <div id="editorBody">
                    <div id="editorEmpty" class="dim">Select a file from the sidebar to edit it.</div>
                </div>
            </section>
            <section id="terminals"></section>
        </section>
    </main>

<script>/* {{JS}} */</script>
</body>
</html>
