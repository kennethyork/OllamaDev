name: eval

# Real model-backed agent eval. CI runners have no GPU, so a 7B model runs on CPU
# (slow) — this is NOT a per-PR gate. It runs weekly and on demand, installs Ollama,
# pulls a tool-capable model, and runs `ollamadev eval` in text mode. It fails only
# on a CATASTROPHIC drop (e.g. tool-calling fully broken → 0 passes), which is the
# exact class of regression the schema bug was — while tolerating normal per-task
# variance of a small local model.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: none
      - name: Build the CLI
        run: bash build.sh
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start Ollama and wait for it
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
      - name: Pull a tool-capable model
        run: ollama pull qwen2.5-coder:7b
      - name: Run the eval (text protocol) and capture the JSON
        run: |
          php ollamadev config set tools.mode text
          php ollamadev eval --model qwen2.5-coder --json | tee /tmp/eval.json
      - name: Gate on catastrophic regression (--min 25)
        # The exit code IS the gate now: `eval --min 25` exits non-zero only when the
        # pass rate falls below 25% — the catastrophic-regression class (e.g. tool
        # calling fully broken), while tolerating a small model's normal task variance.
        run: php ollamadev eval --model qwen2.5-coder --min 25 || (tail -40 /tmp/ollama.log; exit 1)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-result
          path: /tmp/eval.json
