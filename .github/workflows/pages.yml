name: Deploy site to GitHub Pages

# Publishes the static landing/docs site in docs/ to GitHub Pages.
# Runs on pushes that touch the site (or this workflow), and on demand.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least-privilege token the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; newer pushes supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs            # serve the docs/ folder as-is (all links are relative)
      - id: deployment
        uses: actions/deploy-pages@v4
